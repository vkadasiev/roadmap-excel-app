<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Roadmap from Excel</title>
  <script src="./xlsx.full.min.js"></script>
  <style>
    :root {
      --ink: #0d0d0d;
      --muted: #5d5d5d;
      --ash: #8f8f8f;
      --line: #ececec;
      --soft-line: #ececec;
      --panel: #f9f9f9;
      --paper: #ffffff;
      --label-width: 154px;
      --header-height: 48px;
      --control-height: 64px;
      --radius-control: 10px;
      --print-layout-width: auto;
      --print-layout-height: auto;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
      font-feature-settings: "liga" 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto auto 1fr;
      background: var(--paper);
    }

    .topbar {
      min-height: var(--control-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 16px 20px 10px;
      background: var(--paper);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .brand h1 {
      min-width: 0;
      margin: 0;
      font-size: 24px;
      font-weight: 500;
      line-height: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .brand span {
      color: var(--muted);
      font-size: 14px;
      line-height: 20px;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .button,
    .file-button {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 6px 12px;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--soft-line);
      border-radius: var(--radius-control);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
      text-decoration: none;
      transition: background .15s ease, border-color .15s ease;
    }

    .button:hover,
    .file-button:hover {
      background: var(--panel);
      border-color: var(--line);
    }

    .file-button,
    .button.primary,
    .file-button.primary {
      color: var(--paper);
      background: var(--ink);
      border-color: var(--ink);
    }

    .file-button:hover,
    .button.primary:hover,
    .file-button.primary:hover {
      background: var(--ink);
      border-color: var(--ink);
    }

    .file-button input {
      display: none;
    }

    .controls {
      display: grid;
      grid-template-columns: minmax(470px, 1fr) 150px 150px 120px 170px auto;
      gap: 12px;
      align-items: end;
      padding: 10px 20px 16px;
      background: var(--paper);
    }

    .controls .actions {
      align-self: end;
      justify-content: flex-start;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field span {
      color: var(--ash);
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
    }

    .field input,
    .field select {
      width: 100%;
      height: 38px;
      padding: 0 10px;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--soft-line);
      border-radius: var(--radius-control);
      outline: none;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--ink);
    }

    .status {
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      color: var(--ash);
      font-size: 14px;
      line-height: 20px;
      text-align: right;
    }

    .stage {
      overflow: auto;
      padding: 0 20px 20px 0;
      background: var(--paper);
    }

    .roadmap {
      min-width: 980px;
      display: inline-block;
      background: var(--paper);
      border: 1px solid var(--soft-line);
      border-radius: var(--radius-control);
      overflow: hidden;
    }

    .roadmap.is-empty {
      width: 100%;
      min-width: 0;
      display: block;
      background: transparent;
      border: 0;
    }

    .roadmap-surface {
      position: relative;
      min-height: 620px;
      background: var(--paper);
      isolation: isolate;
    }

    .sticky-label-bg {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 80;
      width: calc(var(--label-width) + 1px);
      background: var(--paper);
      pointer-events: none;
      will-change: transform;
    }

    .sticky-label-bg::before {
      position: absolute;
      top: 0;
      right: 100%;
      width: 120px;
      height: 100%;
      background: var(--paper);
      content: "";
    }

    .corner-label {
      position: absolute;
      left: 0;
      top: 0;
      z-index: 150;
      width: calc(var(--label-width) + 1px);
      height: var(--header-height);
      display: flex;
      align-items: center;
      padding: 0 18px 0 22px;
      color: var(--muted);
      background: var(--panel);
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
      pointer-events: none;
      will-change: transform;
    }

    .month-row {
      position: absolute;
      left: var(--label-width);
      right: 0;
      top: 0;
      z-index: 110;
      height: 46px;
      background: var(--paper);
      will-change: transform;
    }

    .header-divider {
      position: absolute;
      left: calc(var(--label-width) + 1px);
      right: 0;
      top: calc(var(--header-height) - 1px);
      z-index: 145;
      height: 1px;
      background: var(--line);
      will-change: transform;
    }

    .month {
      position: absolute;
      top: 0;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 1px solid var(--line);
      font-size: 18px;
      line-height: 1;
      font-weight: 500;
    }

    .month:first-child {
      border-left: 0;
    }

    .chart {
      position: absolute;
      left: var(--label-width);
      top: var(--header-height);
      z-index: 1;
      overflow: hidden;
    }

    .grid-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 1px;
      background: var(--line);
    }

    .lane-band {
      position: absolute;
      left: 0;
      right: 0;
      border-bottom: 1px solid var(--line);
    }

    .lane-band.alt {
      background: var(--panel);
    }

    .lane-labels {
      position: absolute;
      left: 0;
      top: var(--header-height);
      z-index: 90;
      width: calc(var(--label-width) + 1px);
      background: var(--paper);
      overflow: hidden;
      will-change: transform;
      border-right: 1px solid var(--line);
    }

    .lane-label {
      position: absolute;
      left: 0;
      width: calc(var(--label-width) + 1px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--paper);
      color: var(--ink);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.22;
      text-align: center;
      word-break: break-word;
    }

    .lane-label.alt {
      background: var(--panel);
    }

    .lane-label.has-logo {
      display: block;
      padding: 0;
    }

    .lane-label-name {
      display: block;
      max-width: 100%;
      margin: 0 auto;
    }

    .lane-label.has-logo .lane-label-name {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: calc(50% + 41px);
    }

    .lane-logo {
      width: 58px;
      height: 58px;
      display: block;
      margin: 0 auto;
      object-fit: contain;
    }

    .lane-label.has-logo .lane-logo {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .item {
      position: absolute;
      min-height: 52px;
      padding: 8px 10px 8px 14px;
      border: 1px solid var(--line);
      border-radius: 0 var(--radius-control) var(--radius-control) 0;
      color: var(--ink);
      background: var(--paper);
      overflow: hidden;
    }

    .item::before {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 4px;
      background: var(--accent);
      content: "";
    }

    .item.range {
      min-height: 58px;
      padding: 8px 10px 8px 14px;
      border: 1px solid var(--line);
      border-radius: 0 var(--radius-control) var(--radius-control) 0;
      background: var(--paper);
    }

    .item-title {
      display: block;
      overflow: visible;
      overflow-wrap: anywhere;
      text-wrap: balance;
      font-size: 14px;
      line-height: 1.28;
      font-weight: 500;
    }

    .item-date {
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1;
      white-space: nowrap;
    }

    .item.has-reason .item-title,
    .item.has-reason .item-date {
      padding-right: 24px;
    }

    .item-info-button {
      position: absolute;
      top: 5px;
      right: 6px;
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      color: var(--paper);
      background: var(--ink);
      border: 0;
      border-radius: var(--radius-control);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      line-height: 1;
      font-family: inherit;
    }

    .item-info-button:hover {
      background: var(--ink);
    }

    .reason-backdrop {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(13, 13, 13, .16);
    }

    .reason-dialog {
      width: min(560px, 100%);
      max-height: min(70vh, 620px);
      display: grid;
      grid-template-rows: auto 1fr;
      color: var(--ink);
      background: var(--paper);
      border: 1px solid var(--soft-line);
      border-radius: var(--radius-control);
      overflow: hidden;
    }

    .reason-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      border-bottom: 1px solid var(--soft-line);
      font-size: 18px;
      font-weight: 500;
    }

    .reason-close {
      width: 32px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      color: var(--ink);
      background: var(--panel);
      border: 1px solid var(--soft-line);
      border-radius: var(--radius-control);
      cursor: pointer;
      font-size: 22px;
      line-height: 1;
    }

    .reason-text {
      margin: 0;
      padding: 18px;
      overflow: auto;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .empty {
      min-height: calc(100vh - 210px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--ink);
      text-align: center;
    }

    .empty-content {
      max-width: 560px;
      display: grid;
      gap: 18px;
      justify-items: center;
    }

    .empty-text {
      margin: 0;
      margin-bottom: 8px;
      font-size: 24px;
      font-weight: 400;
      line-height: 1.25;
    }

    .empty-spinner {
      width: 42px;
      height: 42px;
      border: 4px solid var(--soft-line);
      border-top-color: var(--ink);
      border-radius: 50%;
      animation: empty-spin .8s linear infinite;
    }

    @keyframes empty-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .empty-upload-button {
      min-width: 220px;
      min-height: 52px;
      padding: 0 28px;
      color: var(--paper);
      background: var(--ink);
      border: 1px solid var(--ink);
      border-radius: var(--radius-control);
      cursor: pointer;
      font-size: 18px;
      font-weight: 500;
      transition: background .15s ease;
    }

    .empty-upload-button:hover {
      background: var(--ink);
    }

    .template-link {
      color: var(--ink);
      font-size: 16px;
      font-weight: 500;
      text-decoration: none;
      border-bottom: 1px solid currentColor;
    }

    .template-link:hover {
      color: var(--ink);
    }

    @media (max-width: 860px) {
      .topbar,
      .controls {
        padding-left: 14px;
        padding-right: 14px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .brand {
        align-items: flex-start;
        flex-direction: column;
        gap: 4px;
      }

      .actions {
        justify-content: flex-start;
      }

      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .controls .actions {
        grid-column: 1 / -1;
      }

      .status {
        justify-content: flex-start;
        text-align: left;
      }

      .stage {
        padding: 0 14px 14px 0;
      }
    }

    @page {
      size: landscape;
      margin: 6mm;
    }

    @media print {
      html,
      body {
        overflow: hidden;
        background: #ffffff;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }

      .app-shell {
        min-height: 0;
        display: block;
      }

      .topbar,
      .controls {
        display: none;
      }

      .stage {
        width: var(--print-layout-width);
        height: var(--print-layout-height);
        padding: 0;
        overflow: hidden;
        background: #ffffff;
      }

      .roadmap {
        width: var(--print-layout-width) !important;
        height: var(--print-layout-height) !important;
        min-width: 0;
        overflow: visible;
        background: #ffffff;
        border: 0;
        border-radius: 0;
      }

      .roadmap,
      .roadmap * {
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }

      .roadmap-surface {
        min-height: 0;
      }

      .roadmap :is(.month, .lane-label-name, .item-title, .item-date, .corner-label) {
        visibility: visible !important;
        opacity: 1 !important;
        color: #0d0d0d !important;
        -webkit-text-fill-color: currentColor;
      }

      .sticky-label-bg,
      .lane-labels,
      .corner-label,
      .month-row,
      .header-divider {
        transform: none !important;
      }

      .sticky-label-bg {
        display: none;
      }

      .lane-labels {
        background: transparent;
      }

      .month-row,
      .month {
        height: var(--header-height);
      }

      .month {
        font-size: 13px;
      }

      .header-divider {
        top: calc(var(--header-height) - 1px);
        height: 1px;
      }

      .corner-label {
        padding: 0 6px;
        font-size: 7px;
        border-bottom-width: 1px;
      }

      .lane-label {
        gap: 4px;
        padding: 5px;
        font-size: 8px;
        line-height: 1.12;
      }

      .lane-label.has-logo .lane-label-name {
        bottom: calc(50% + 21px);
      }

      .lane-logo {
        width: 30px;
        height: 30px;
      }

      .item {
        min-height: 0;
        padding: 3px 5px 4px 6px;
      }

      .item.range {
        min-height: 0;
        padding: 3px 5px 4px 6px;
      }

      .item-title {
        font-size: 8px;
        line-height: 1.14;
      }

      .item-date {
        margin-top: 2px;
        font-size: 9px;
      }

      .item-info-button {
        top: -1px;
        right: -1px;
        width: 10px;
        height: 10px;
        font-size: 7px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <h1 id="brandTitle">Roadmap ЕЛКП</h1>
        <span>Excel to timeline</span>
      </div>
    </header>

    <section class="controls">
      <div class="actions">
        <label class="file-button">
          <span>Загрузить Excel</span>
          <input id="fileInput" type="file" accept=".xlsx,.xls,.csv">
        </label>
        <a class="button" href="./roadmap-template.xlsx" download="roadmap-template.xlsx">Скачать шаблон</a>
        <button class="button" id="sampleButton" type="button">Пример</button>
        <button class="button" id="printButton" type="button">Печать / PDF</button>
        <a class="button" href="https://docs.google.com/spreadsheets/d/1LExhwUzw40iR-2UMjDEEXkx2651YwnSgZRkDgqwcAx8/edit?usp=sharing" target="_blank" rel="noopener">Открыть Google таблицу</a>
      </div>
      <label class="field">
        <span>Начало</span>
        <input id="rangeStartInput" type="date" value="2026-05-14">
      </label>
      <label class="field">
        <span>Конец</span>
        <input id="rangeEndInput" type="date" value="2026-09-10">
      </label>
      <label class="field">
        <span>Год</span>
        <input id="yearInput" type="number" min="2000" max="2100">
      </label>
      <label class="field">
        <span>Масштаб</span>
        <select id="scaleInput">
          <option value="8">Компактный</option>
          <option value="11" selected>Обычный</option>
          <option value="14">Широкий</option>
        </select>
      </label>
      <div class="status" id="status">Загрузите Excel</div>
    </section>

    <main class="stage">
      <div class="roadmap" id="roadmap"></div>
    </main>
  </div>

  <script>
    const MONTHS_RU = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];
    const MONTHS_SHORT = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const MONTH_LOOKUP = new Map(Object.entries({
      jan: 0, january: 0, "янв": 0, "январь": 0, "января": 0,
      feb: 1, february: 1, "фев": 1, "февраль": 1, "февраля": 1,
      mar: 2, march: 2, "мар": 2, "март": 2, "марта": 2,
      apr: 3, april: 3, "апр": 3, "апрель": 3, "апреля": 3,
      may: 4, "май": 4, "мая": 4,
      jun: 5, june: 5, "июн": 5, "июнь": 5, "июня": 5,
      jul: 6, july: 6, "июл": 6, "июль": 6, "июля": 6,
      aug: 7, august: 7, "авг": 7, "август": 7, "августа": 7,
      sep: 8, sept: 8, september: 8, "сен": 8, "сент": 8, "сентябрь": 8, "сентября": 8,
      oct: 9, october: 9, "окт": 9, "октябрь": 9, "октября": 9,
      nov: 10, november: 10, "ноя": 10, "ноябрь": 10, "ноября": 10,
      dec: 11, december: 11, "дек": 11, "декабрь": 11, "декабря": 11
    }));
    const GOOGLE_SHEET_SOURCE = {
      id: "1LExhwUzw40iR-2UMjDEEXkx2651YwnSgZRkDgqwcAx8",
      gid: "0",
      name: "Google Таблицы"
    };
    const PRINT_SAFE_WIDTH = 960;
    const PRINT_SAFE_HEIGHT = 650;
    const PRINT_LABEL_WIDTH = 72;
    const PRINT_HEADER_HEIGHT = 30;
    const PRINT_MAX_DAY_SCALE = 8;
    const PRINT_MIN_DAY_SCALE = 1;
    const PRINT_SCALE_STEP = .25;
    let printScrollState = null;
    let printRootState = null;
    const NEW_PRODUCT_COLOR = "#2b9faa";
    const PRODUCT_COLORS = new Map(Object.entries({
      "офд": "#2b9faa",
      "эдо": "#e8a51a",
      "документооборот": "#e8a51a",
      "елк": "#4b5563",
      "елкп": "#2b9faa",
      "кассы": "#2b9faa",
      "кудир": "#2f7ed8",
      "бухгалтерия": "#2f7ed8",
      "го": "#2f7ed8",
      "аккаунт": "#8b9298",
      "покупки": "#8b9298"
    }));
    const PRODUCT_LOGOS = new Map(Object.entries({
      "офд": "./assets/logos/ofd.svg",
      "кудир": "./assets/logos/kudir.svg",
      "бухгалтерия": "./assets/logos/kudir.svg",
      "го": "./assets/logos/go.svg",
      "эдо": "./assets/logos/edo.svg",
      "документооборот": "./assets/logos/edo.svg",
      "елк": "./assets/logos/elk.svg",
      "елкп": "./assets/logos/elk.svg"
    }));
    const FALLBACK_YEAR = new Date().getFullYear();

    const sampleItems = [
      ["Документооборот", "Модальное окно подписания ответного титула акта сверки", "12.Jun"],
      ["Документооборот", "Модальное окно подписания ответного титула УКД", "12.Jun"],
      ["Документооборот", "Модальное окно подписания ответного титула нового формата УКД (с 2026)", "12.Jun"],

    async function readWorkbook(file) {
      if (!window.XLSX) throw new Error("XLSX parser is not loaded");
      if (/\.csv$/i.test(file.name || "") || /csv/i.test(file.type || "")) {
        const text = await file.text();
        const workbook = XLSX.read(text, { type: "string", raw: true });
        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
        return XLSX.utils.sheet_to_json(firstSheet, { defval: "", raw: true });
      }

      const data = await file.arrayBuffer();
      const workbook = XLSX.read(data, { type: "array", cellDates: true });
      const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
      return XLSX.utils.sheet_to_json(firstSheet, { defval: "", raw: true });
    }

    async function loadDefaultGoogleSheet() {
      if (!GOOGLE_SHEET_SOURCE.id) {

          setStatus("В Google Таблице не нашел строки с названием и датой");
          renderEmpty("В Google Таблице не нашел строки с названием и датой.");
          return;

      } catch (error) {

        if (loadToken !== state.loadToken) return;
        state.items = [];
        state.sourceName = "";
        state.rawRows = null;
        setStatus("Не удалось загрузить Google Таблицу");
        renderEmpty("Не удалось подтянуть Google Таблицу. Можно загрузить Excel вручную.");
      }
    }

    function loadGoogleSheetRows(source) {
      return new Promise((resolve, reject) => {
        const callbackName = `__roadmapGoogleSheet_${Date.now()}_${Math.random().toString(36).slice(2)}`;
        const script = document.createElement("script");
        const timeout = window.setTimeout(() => {
          cleanup();
          reject(new Error("Google Sheet request timed out"));
        }, 25000);

        function cleanup() {
          window.clearTimeout(timeout);
          delete window[callbackName];
          script.remove();
        }

        window[callbackName] = (response) => {
          cleanup();
          if (!response || response.status !== "ok" || !response.table) {
            reject(new Error(response && response.errors ? JSON.stringify(response.errors) : "Google Sheet response is not ok"));
            return;
          }
          resolve(googleTableToRows(response.table));
        };

        script.onerror = () => {
          cleanup();
          reject(new Error("Google Sheet script load failed"));
        };

        const params = new URLSearchParams({
          tqx: `out:json;responseHandler:${callbackName}`,
          gid: source.gid || "0",
          cacheBust: String(Date.now())
        });
        script.src = `https://docs.google.com/spreadsheets/d/${encodeURIComponent(source.id)}/gviz/tq?${params.toString()}`;
        document.head.appendChild(script);
      });
    }

    function googleTableToRows(table) {
      const columns = (table.cols || []).map((column) => ({
        header: String(column.label || "").trim(),
        type: column.type || ""
      }));

      return (table.rows || []).map((row) => {
        const output = {};
        columns.forEach((column, index) => {
          if (!column.header) return;
          const cell = row.c && row.c[index];
          output[column.header] = googleCellValue(cell, column.type);
        });
        return output;
      }).filter((row) => Object.values(row).some((value) => String(value || "").trim()));
    }

    function googleCellValue(cell, type) {
      if (!cell || cell.v === null || cell.v === undefined) return "";
      const value = cell.v;

      if (type === "date" || type === "datetime") {
        const googleDate = parseGoogleDateValue(value);
        if (googleDate) return googleDate;
      }

      return value;
    }

    function parseGoogleDateValue(value) {
      if (value instanceof Date) return stripTime(value);
      const match = String(value).match(/^Date\((\d{4}),(\d{1,2}),(\d{1,2})(?:,\d+,\d+,\d+)?\)$/);
      if (!match) return null;
      return makeDate(Number(match[1]), Number(match[2]), Number(match[3]));
    }

    function rowsToItems(rows) {
      return rows.map((row, index) => {
        const title = valueByHeader(row, ["название", "фича", "задача", "этап", "описание", "title", "feature", "task", "name", "item"]) || firstText(row);
        const product = valueByHeader(row, ["продукт", "продукты", "сервис", "модуль", "направление", "product", "products", "service", "module"]) ||
          valueByHeader(row, ["группа", "поток", "ряд", "раздел", "категория", "lane", "group", "track", "row", "section", "category"]) ||
          "Продукт";
        const releaseRaw = valueByExactHeader(row, ["плановая дата релиза", "плановая дата выпуска", "planned release date", "target release date", "release date"]) ||
          valueByHeader(row, ["дата релиза", "релиз", "release"]);
        const reason = cleanReason(valueByHeader(row, [
          "причина переноса плановой даты релиза",
          "причина переноса",
          "причина изменения даты релиза",
          "почему перенесли релиз",
          "reason",
          "delay reason",
          "reschedule reason"
        ]));
        const startRaw = releaseRaw ||
          valueByHeader(row, ["начало", "дата начала", "старт", "start", "start date", "startdate"]) ||
          valueByHeader(row, ["дата", "срок", "релиз", "дедлайн", "date", "deadline", "due date", "duedate"]);
        const endRaw = releaseRaw ? "" : valueByHeader(row, ["конец", "дата окончания", "финиш", "end", "finish", "end date", "enddate"]);
        const start = parseDate(startRaw, Number(els.yearInput.value) || FALLBACK_YEAR);
        const end = parseDate(endRaw, Number(els.yearInput.value) || FALLBACK_YEAR);

        if (!String(title || "").trim() || !start) return null;
        const normalized = normalizePeriod(start, end);
        return {
          id: `item-${index}`,
          title: String(title).trim(),
          product: String(product || "Продукт").trim(),
          lane: String(product || "Продукт").trim(),
          start: normalized.start,
          end: normalized.end,
          reason
        };
      }).filter(Boolean);
    }

    function cleanReason(value) {
      const text = String(value || "").trim();
      if (!text || /^[-–—]+$/.test(text)) return "";
      if (/^(нет|не указано|n\/a|na)$/i.test(text)) return "";
      return text;
    }

    function valueByExactHeader(row, options) {
      const keys = Object.keys(row);
      const normalizedOptions = options.map(normalizeHeader);
      for (const key of keys) {
        if (normalizedOptions.includes(normalizeHeader(key))) return row[key];
      }
      return "";
    }

    function valueByHeader(row, options) {
      const keys = Object.keys(row);
      const normalizedOptions = options.map(normalizeHeader);
      for (const key of keys) {
        const nk = normalizeHeader(key);
        if (normalizedOptions.includes(nk)) return row[key];
      }
      for (const key of keys) {
        const nk = normalizeHeader(key);
        const hit = normalizedOptions.find((option) => option.length > 3 && (nk.includes(option) || option.includes(nk)));
        if (hit) return row[key];
      }
      return "";
    }

    function normalizeHeader(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/ё/g, "е")
        .replace(/[\s._\-:;/\\()[\]{}]+/g, "")
        .trim();
    }

    function firstText(row) {
      const value = Object.values(row).find((cell) => typeof cell === "string" && cell.trim() && !parseDate(cell, Number(els.yearInput.value) || FALLBACK_YEAR));
      return value || "";
    }

    function parseDate(value, defaultYear) {
      if (!value && value !== 0) return null;
      if (value instanceof Date && !Number.isNaN(value.getTime())) return stripTime(value);
      if (typeof value === "number") {
        if (value > 10000101 && value < 99991231) {
          const raw = String(value);
          return new Date(Number(raw.slice(0, 4)), Number(raw.slice(4, 6)) - 1, Number(raw.slice(6, 8)));
        }
        if (window.XLSX && XLSX.SSF && XLSX.SSF.parse_date_code) {
          const parsed = XLSX.SSF.parse_date_code(value);
          if (parsed) return new Date(parsed.y, parsed.m - 1, parsed.d);
        }
      }

      const text = String(value).trim().replace(/\s+/g, " ");
      if (!text) return null;

      const iso = text.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
      if (iso) return makeDate(Number(iso[1]), Number(iso[2]) - 1, Number(iso[3]));

      const numeric = text.match(/^(\d{1,2})[./-](\d{1,2})(?:[./-](\d{2,4}))?$/);
      if (numeric) {
        const year = numeric[3] ? normalizeYear(numeric[3]) : defaultYear;
        return makeDate(year, Number(numeric[2]) - 1, Number(numeric[1]));
      }

      const named = text.toLowerCase().replace(",", ".").match(/^(\d{1,2})[.\s-]*([a-zа-яё]+)\.?(?:[,\s-]+(\d{2,4}))?$/i);
      if (named) {
        const month = MONTH_LOOKUP.get(named[2].replace("ё", "е"));
        if (month !== undefined) return makeDate(named[3] ? normalizeYear(named[3]) : defaultYear, month, Number(named[1]));
      }

      const parsed = new Date(text);
      return Number.isNaN(parsed.getTime()) ? null : stripTime(parsed);
    }

    function makeDate(year, month, day) {
      const date = new Date(year, month, day);
      return Number.isNaN(date.getTime()) ? null : stripTime(date);
    }

    function normalizeYear(value) {
      const year = Number(value);
      return year < 100 ? 2000 + year : year;
    }

    function normalizePeriod(start, end) {
      if (!end) return { start, end: null };
      if (end < start) return { start: end, end: start };
      return { start, end };
    }

    function stripTime(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function productLaneKey(product) {
      const key = normalizeHeader(product);
      return key === "елк" ? "елкп" : key;
    }

    function productColor(product) {
      return PRODUCT_COLORS.get(productLaneKey(product)) || NEW_PRODUCT_COLOR;
    }

    function productLogo(product) {
      return PRODUCT_LOGOS.get(productLaneKey(product)) || "";
    }

    function productDisplayName(product) {
      const name = String(product || "").trim();
      return productLaneKey(name) === "елкп" ? "ЕЛКП" : name;
    }

    function render() {
      const items = state.items.filter((item) => item.start);
      if (!items.length) {
        renderEmpty("Для того, чтобы сформировать Roadmap загрузите список задач в Excel.");
        return;
      }

      const selectedRange = getSelectedRange(items);
      const visibleItems = getVisibleItems(items, selectedRange);
      if (!visibleItems.length) {
        renderEmpty("В выбранном периоде нет задач. Измените даты или загрузите другой Excel.");
        return;
      }

      const scale = state.isPrintLayout ? state.printDayScale : Number(els.scaleInput.value) || 11;
      const range = getVisibleRange(selectedRange);
      const monthLayout = buildMonthLayout(visibleItems, range, scale);
      const chartWidth = monthLayout.width;
      const layout = buildLayout(visibleItems, monthLayout, scale, chartWidth);
      const totalHeight = layout.height + headerHeight();
      const totalWidth = chartWidth + labelWidth();
      const title = state.title || `Roadmap ЕЛКП ${formatRangeTitleFromDates(selectedRange.start, selectedRange.end)}`;

      syncBrandTitle(title);
      els.roadmap.classList.remove("is-empty");
      els.roadmap.innerHTML = "";
      els.roadmap.style.width = `${totalWidth}px`;

      const surface = div("roadmap-surface");
      surface.style.width = `${totalWidth}px`;
      surface.style.height = `${totalHeight}px`;

      const stickyLabelBg = div("sticky-label-bg");
      stickyLabelBg.style.height = `${totalHeight}px`;

      const cornerLabel = div("corner-label");
      cornerLabel.textContent = "Продукт";

      const monthRow = div("month-row");
      monthRow.style.width = `${chartWidth}px`;
      monthLayout.months.forEach((month) => {
        const node = div("month");
        node.style.left = `${month.left}px`;
        node.style.width = `${month.width}px`;
        node.textContent = MONTHS_RU[month.start.getMonth()];
        monthRow.appendChild(node);
      });

      const headerDivider = div("header-divider");

      const chart = div("chart");
      chart.style.width = `${chartWidth}px`;
      chart.style.height = `${layout.height}px`;

      layout.lanes.forEach((lane, index) => {
        const band = div(`lane-band${index % 2 === 0 ? " alt" : ""}`);
        band.style.top = `${lane.top}px`;
        band.style.height = `${lane.height}px`;
        chart.appendChild(band);
      });

      monthLayout.months.forEach((month) => {
        const line = div("grid-line");
        line.style.left = `${month.left}px`;
        chart.appendChild(line);
      });

      layout.items.forEach((item) => {
        const node = div(`item${item.isRange ? " range" : ""}${item.reason ? " has-reason" : ""}`);
        node.style.left = `${item.x}px`;
        node.style.top = `${item.y}px`;
        node.style.width = `${item.width}px`;
        node.style.minHeight = `${item.height}px`;
        node.style.setProperty("--accent", item.color);
        node.style.setProperty("--wash", withAlpha(item.color, .12));
        node.innerHTML = `
          <div class="item-title">${escapeHtml(item.title)}</div>
          <div class="item-date">${escapeHtml(formatItemDate(item.sourceStart || item.start, item.sourceEnd || null))}</div>
        `;
        if (item.reason) {
          const infoButton = document.createElement("button");
          infoButton.className = "item-info-button";
          infoButton.type = "button";
          infoButton.title = "Причина переноса";
          infoButton.setAttribute("aria-label", "Показать причину переноса");
          infoButton.textContent = "i";
          infoButton.addEventListener("click", (event) => {
            event.stopPropagation();
            showReason(item.reason);
          });
          node.appendChild(infoButton);
        }
        chart.appendChild(node);
      });

      const labels = div("lane-labels");
      labels.style.height = `${layout.height}px`;
      layout.lanes.forEach((lane, index) => {
        const node = div(`lane-label${index % 2 === 0 ? " alt" : ""}`);
        node.style.top = `${lane.top}px`;
        node.style.height = `${lane.height}px`;
        const labelName = lane.name;
        const logo = productLogo(lane.key);
        if (logo) node.classList.add("has-logo");
        node.innerHTML = `
          <span class="lane-label-name">${escapeHtml(labelName)}</span>
          ${logo ? `<img class="lane-logo" src="${escapeHtml(logo)}" alt="Логотип ${escapeHtml(labelName)}">` : ""}
        `;
        labels.appendChild(node);
      });

      surface.append(monthRow, headerDivider, chart, stickyLabelBg, labels, cornerLabel);
      els.roadmap.appendChild(surface);
      updatePinnedLabels();
    }

    function renderEmpty(message, options = {}) {
      const isLoading = Boolean(options.isLoading);
      const showUpload = options.showUpload !== false;
      const showTemplate = options.showTemplate !== false;
      syncBrandTitle(state.title || "Roadmap ЕЛКП");
      els.roadmap.classList.add("is-empty");
      els.roadmap.style.width = "";
      els.roadmap.innerHTML = `
        <div class="empty">
          <div class="empty-content">
            <p class="empty-text">${escapeHtml(message)}</p>
            ${isLoading ? '<div class="empty-spinner" role="status" aria-label="Загрузка"></div>' : ""}
            ${showUpload ? '<button class="empty-upload-button" type="button">Загрузить</button>' : ""}
            ${showTemplate ? '<a class="template-link" href="./roadmap-template.xlsx" download="roadmap-template.xlsx">Скачать шаблон файла для загрузки</a>' : ""}
          </div>
        </div>
      `;
      const uploadButton = els.roadmap.querySelector(".empty-upload-button");
      if (uploadButton) uploadButton.addEventListener("click", () => els.fileInput.click());
    }

    function syncBrandTitle(title) {
      if (els.brandTitle) els.brandTitle.textContent = title;
    }

    function preparePrintLayout() {
      if (!els.roadmap || els.roadmap.classList.contains("is-empty")) return;

      if (state.isPrintLayout) return;

      if (els.stage) {
        printScrollState = {
          left: els.stage.scrollLeft,
          top: els.stage.scrollTop
        };
        els.stage.scrollLeft = 0;
        els.stage.scrollTop = 0;
      }

      printRootState = {
        labelWidth: document.documentElement.style.getPropertyValue("--label-width"),
        headerHeight: document.documentElement.style.getPropertyValue("--header-height")
      };
      document.documentElement.style.setProperty("--label-width", `${PRINT_LABEL_WIDTH}px`);
      document.documentElement.style.setProperty("--header-height", `${PRINT_HEADER_HEIGHT}px`);

      state.isPrintLayout = true;
      state.printDayScale = choosePrintDayScale();
      render();

      const surface = els.roadmap.querySelector(".roadmap-surface");
      if (!surface) return;
      const surfaceWidth = parseFloat(surface.style.width) || surface.offsetWidth || els.roadmap.scrollWidth;
      const surfaceHeight = parseFloat(surface.style.height) || surface.offsetHeight || els.roadmap.scrollHeight;
      if (!surfaceWidth || !surfaceHeight) return;

      state.printOverflow = surfaceWidth > PRINT_SAFE_WIDTH || surfaceHeight > PRINT_SAFE_HEIGHT;
      if (state.printOverflow) {
        console.warn("Roadmap PDF may not fit one page. Narrow the date range or reduce loaded items.");
      }
      document.documentElement.style.setProperty("--print-layout-width", `${Math.ceil(surfaceWidth)}px`);
      document.documentElement.style.setProperty("--print-layout-height", `${Math.ceil(surfaceHeight)}px`);
    }

    function restoreScreenLayout() {
      resetPrintLayout();
      if (state.isPrintLayout) {
        state.isPrintLayout = false;
        state.printDayScale = null;
        state.printOverflow = false;
        render();
      }
      if (printScrollState && els.stage) {
        els.stage.scrollLeft = printScrollState.left;
        els.stage.scrollTop = printScrollState.top;
      }
      printScrollState = null;
      updatePinnedLabels();
    }

    function resetPrintLayout() {
      document.documentElement.style.removeProperty("--print-layout-width");
      document.documentElement.style.removeProperty("--print-layout-height");
      if (printRootState) {
        restoreRootCustomProperty("--label-width", printRootState.labelWidth);
        restoreRootCustomProperty("--header-height", printRootState.headerHeight);
        printRootState = null;
      }
    }

    function restoreRootCustomProperty(name, value) {
      if (value) {
        document.documentElement.style.setProperty(name, value);
      } else {
        document.documentElement.style.removeProperty(name);
      }
    }

    function choosePrintDayScale() {
      const items = state.items.filter((item) => item.start);
      if (!items.length) return PRINT_MIN_DAY_SCALE;

      for (let scale = PRINT_MAX_DAY_SCALE; scale >= PRINT_MIN_DAY_SCALE; scale -= PRINT_SCALE_STEP) {
        const size = measureLayoutSize(items, scale);
        if (size.width <= PRINT_SAFE_WIDTH && size.height <= PRINT_SAFE_HEIGHT) {
          return Number(scale.toFixed(2));
        }
      }
      return PRINT_MIN_DAY_SCALE;
    }

    function measureLayoutSize(items, scale) {
      const selectedRange = getSelectedRange(items);
      const visibleItems = getVisibleItems(items, selectedRange);
      if (!visibleItems.length) return { width: 0, height: 0 };

      const range = getVisibleRange(selectedRange);
      const monthLayout = buildMonthLayout(visibleItems, range, scale);
      const layout = buildLayout(visibleItems, monthLayout, scale, monthLayout.width);
      return {
        width: monthLayout.width + labelWidth(),
        height: layout.height + headerHeight()
      };
    }

    async function waitForPrintAssets() {
      if (document.fonts && document.fonts.ready) {
        try {
          await document.fonts.ready;
        } catch (error) {
          console.warn("Fonts were not ready before print", error);
        }
      }

      const images = Array.from(els.roadmap.querySelectorAll("img"));
      await Promise.all(images.map((image) => {
        if (image.complete) return Promise.resolve();
        if (image.decode) return image.decode().catch(() => {});
        return new Promise((resolve) => {
          image.addEventListener("load", resolve, { once: true });
          image.addEventListener("error", resolve, { once: true });
        });
      }));
    }

    function updatePinnedLabels() {
      const offsetX = els.stage ? els.stage.scrollLeft : 0;
      const surface = els.roadmap.querySelector(".roadmap-surface");
      const localScrollY = els.stage ? els.stage.scrollTop : 0;
      let offsetY = localScrollY;
      if (surface) {
        const viewportPinnedY = Math.max(0, -surface.getBoundingClientRect().top);
        const maxPinnedY = Math.max(0, surface.offsetHeight - headerHeight());
        offsetY = Math.min(maxPinnedY, Math.max(localScrollY, viewportPinnedY));
      }
      const pinnedX = `translateX(${offsetX}px)`;
      const pinnedY = `translateY(${offsetY}px)`;
      const pinnedXY = `translate(${offsetX}px, ${offsetY}px)`;
      const labels = els.roadmap.querySelector(".lane-labels");
      const background = els.roadmap.querySelector(".sticky-label-bg");
      const cornerLabel = els.roadmap.querySelector(".corner-label");
      const monthRow = els.roadmap.querySelector(".month-row");
      const headerDivider = els.roadmap.querySelector(".header-divider");
      if (labels) labels.style.transform = pinnedX;
      if (background) background.style.transform = pinnedX;
      if (cornerLabel) cornerLabel.style.transform = pinnedXY;
      if (monthRow) monthRow.style.transform = pinnedY;
      if (headerDivider) headerDivider.style.transform = pinnedY;
    }

    function showReason(text) {
      closeReason();

      const backdrop = document.createElement("div");
      backdrop.className = "reason-backdrop";
      backdrop.innerHTML = `
        <div class="reason-dialog" role="dialog" aria-modal="true" aria-label="Причина переноса">
          <div class="reason-header">
            <span>Причина переноса</span>
            <button class="reason-close" type="button" aria-label="Закрыть">×</button>
          </div>
          <pre class="reason-text"></pre>
        </div>
      `;

      backdrop.querySelector(".reason-text").textContent = text;
      backdrop.querySelector(".reason-close").addEventListener("click", closeReason);
      backdrop.addEventListener("click", (event) => {
        if (event.target === backdrop) closeReason();
      });
      document.body.appendChild(backdrop);
    }

    function closeReason() {
      const existing = document.querySelector(".reason-backdrop");
      if (existing) existing.remove();
    }

    function getVisibleItems(items, selectedRange) {
      return items.map((item) => {
        const sourceStart = item.start;
        const sourceEnd = item.end || item.start;
        if (sourceEnd < selectedRange.start || sourceStart > selectedRange.end) return null;

        const start = sourceStart < selectedRange.start ? selectedRange.start : sourceStart;
        const end = sourceEnd > selectedRange.end ? selectedRange.end : sourceEnd;
        return {
          ...item,
          sourceStart,
          sourceEnd: item.end || null,
          start,
          end: item.end ? end : null,
          isRange: Boolean(item.end)
        };
      }).filter(Boolean);
    }

    function labelWidth() {
      if (state.isPrintLayout) return PRINT_LABEL_WIDTH;
      const value = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--label-width"));
      return Number.isFinite(value) ? value : 154;
    }

    function headerHeight() {
      if (state.isPrintLayout) return PRINT_HEADER_HEIGHT;
      const value = parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--header-height"));
      return Number.isFinite(value) ? value : 96;
    }

    function buildMonthLayout(items, range, scale) {
      const months = getMonths(range.start, range.end).map((month) => ({
        ...month,
        left: 0,
        width: daysBetween(month.start, addDays(month.end, 1)) * scale
      }));

      items.forEach((item) => {
        const month = monthForDate(months, item.start);
        if (!month) return;

        const width = itemDisplayWidth(item, scale);
        const localX = daysBetween(month.start, item.start) * scale + 12;
        const needsSameMonthFit = !item.end || isSameMonth(item.start, item.end);
        if (needsSameMonthFit) {
          month.width = Math.max(month.width, localX + width + 22);
        }
      });

      recalcMonthLefts({ months, width: 0 });
      return { months, width: months.reduce((sum, month) => sum + month.width, 0) };
    }

    function recalcMonthLefts(monthLayout) {
      let left = 0;
      monthLayout.months.forEach((month) => {
        month.left = left;
        left += month.width;
      });
      monthLayout.width = left;
    }

    function monthForDate(months, date) {
      return months.find((month) => date >= month.start && date <= month.end) || null;
    }

    function isSameMonth(a, b) {
      return a && b && a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth();
    }

    function dateToX(monthLayout, date, scale) {
      const month = monthForDate(monthLayout.months, date);
      if (!month) {
        const first = monthLayout.months[0];
        const last = monthLayout.months[monthLayout.months.length - 1];
        if (first && date < first.start) return 0;
        if (last && date > last.end) return last.left + last.width;
        return 0;
      }
      return month.left + daysBetween(month.start, date) * scale;
    }

    function itemDisplayWidth(item, scale, monthLayout) {
      const contentWidth = requiredContentWidth(item);
      const minSingleWidth = state.isPrintLayout ? 62 : 190;
      const minRangeWidth = state.isPrintLayout ? 74 : 176;
      if (item.end && monthLayout) {
        if (isSameMonth(item.start, item.end)) {
          const rangeWidth = daysBetween(item.start, addDays(item.end, 1)) * scale;
          return Math.max(minRangeWidth, contentWidth, rangeWidth);
        }
        const rangeWidth = dateToX(monthLayout, addDays(item.end, 1), scale) - dateToX(monthLayout, item.start, scale);
        return Math.max(minRangeWidth, rangeWidth);
      }
      if (item.end) {
        const rangeWidth = daysBetween(item.start, addDays(item.end, 1)) * scale;
        return Math.max(minRangeWidth, contentWidth, rangeWidth);
      }
      return Math.max(minSingleWidth, contentWidth);
    }

    function requiredContentWidth(item) {
      const title = String(item.title || "");
      const date = formatItemDate(item.start, item.end);
      const horizontalPadding = state.isPrintLayout ? (item.end ? 14 : 12) : (item.end ? 40 : 38);
      const averageTitleCharWidth = state.isPrintLayout ? 4.6 : 10.4;
      const averageDateCharWidth = state.isPrintLayout ? 5.2 : 11.2;
      const titleWrapDivisor = state.isPrintLayout ? 2.8 : 1.8;
      const longestWord = title.split(/\s+/).reduce((max, word) => Math.max(max, word.length), 0);
      const twoLineTitleWidth = Math.ceil(Math.max(
        title.length * averageTitleCharWidth / titleWrapDivisor,
        longestWord * averageTitleCharWidth
      ));
      const dateWidth = Math.ceil(date.length * averageDateCharWidth);
      return Math.ceil(Math.max(twoLineTitleWidth, dateWidth) + horizontalPadding);
    }

    function itemDisplayHeight(item, width) {
      const horizontalPadding = state.isPrintLayout ? (item.end ? 12 : 10) : (item.end ? 25 : 21);
      const usableWidth = Math.max(state.isPrintLayout ? 42 : 120, width - horizontalPadding);
      const averageCharWidth = state.isPrintLayout ? 4.2 : 9.2;
      const lineHeight = state.isPrintLayout ? 9 : 22;
      const titleLines = Math.max(1, Math.ceil(String(item.title || "").length * averageCharWidth / usableWidth));
      const chromeHeight = state.isPrintLayout ? (item.end ? 13 : 11) : (item.end ? 47 : 38);
      const minHeight = state.isPrintLayout ? (item.end ? 20 : 18) : (item.end ? 58 : 52);
      return Math.max(minHeight, chromeHeight + titleLines * lineHeight);
    }

    function buildLayout(sourceItems, monthLayout, scale, chartWidth) {
      const lanesByKey = new Map();
      sourceItems.forEach((sourceItem, index) => {
        const sourceName = sourceItem.product || sourceItem.lane || "Продукт";
        const laneKey = productLaneKey(sourceName);
        if (!lanesByKey.has(laneKey)) {
          lanesByKey.set(laneKey, {
            key: laneKey,
            name: productDisplayName(sourceName),
            items: []
          });
        }
        lanesByKey.get(laneKey).items.push({
          ...sourceItem,
          order: index,
          color: productColor(laneKey)
        });
      });

      const laneGroups = Array.from(lanesByKey.values());

      const lanes = [];
      const laidOut = [];
      let cursorTop = 0;

      laneGroups.forEach((laneGroup) => {
        const laneItems = laneGroup.items
          .map((item) => {
            const width = itemDisplayWidth(item, scale, monthLayout);
            const baseX = dateToX(monthLayout, item.start, scale) + 12;
            const month = monthForDate(monthLayout.months, item.start);
            const staysInStartMonth = !item.end || isSameMonth(item.start, item.end);
            const maxX = staysInStartMonth
              ? month.left + month.width - width - 14
              : chartWidth - width - 14;
            const minX = staysInStartMonth
              ? month.left + 8
              : 8;
            const x = Math.max(minX, Math.min(baseX, maxX));
            const height = itemDisplayHeight(item, width);
            return { ...item, x, width, height };
          })
          .sort((a, b) => a.start - b.start || a.order - b.order);

        const slots = [];
        const slotHeights = [];
        laneItems.forEach((item) => {
          let slot = slots.findIndex((freeX) => freeX <= item.x);
          if (slot < 0) slot = slots.length;
          slots[slot] = item.x + item.width + 20;
          slotHeights[slot] = Math.max(slotHeights[slot] || 0, item.height);
          item.slot = slot;
        });

        const slotGap = state.isPrintLayout ? 4 : 18;
        const slotTops = [];
        let slotCursor = 0;
        slotHeights.forEach((height, index) => {
          slotTops[index] = slotCursor;
          slotCursor += height + slotGap;
        });

        const laneMinHeight = state.isPrintLayout ? 46 : 146;
        const lanePadding = state.isPrintLayout ? 10 : 48;
        const laneItemTop = state.isPrintLayout ? 5 : 24;
        const laneHeight = Math.max(laneMinHeight, Math.max(0, slotCursor - slotGap) + lanePadding);
        const lane = { key: laneGroup.key, name: laneGroup.name, top: cursorTop, height: laneHeight };
        lanes.push(lane);

        laneItems.forEach((item) => {
          laidOut.push({
            ...item,
            y: cursorTop + laneItemTop + slotTops[item.slot]
          });
        });

        cursorTop += laneHeight;
      });

      return { lanes, items: laidOut, height: cursorTop };
    }

    function getVisibleRange(selectedRange) {
      const normalized = selectedRange;
      return {
        start: new Date(normalized.start.getFullYear(), normalized.start.getMonth(), 1),
        end: new Date(normalized.end.getFullYear(), normalized.end.getMonth() + 1, 0)
      };
    }

    function getSelectedRange(items) {
      const exact = getExactRange(items);
      const manualStart = parseDateInput(els.rangeStartInput.value);
      const manualEnd = parseDateInput(els.rangeEndInput.value);
      const exactStart = manualStart || exact.start;
      const exactEnd = manualEnd || exact.end;
      return exactEnd < exactStart
        ? { start: exactEnd, end: exactStart }
        : { start: exactStart, end: exactEnd };
    }

    function getExactRange(items) {
      const starts = items.map((item) => item.start.getTime());
      const ends = items.map((item) => (item.end || item.start).getTime());
      const min = new Date(Math.min(...starts));
      const max = new Date(Math.max(...ends));
      return { start: stripTime(min), end: stripTime(max) };
    }

    function setRangeInputsFromItems(items) {
      const range = getExactRange(items);
      els.rangeStartInput.value = dateToInput(range.start);
      els.rangeEndInput.value = dateToInput(range.end);
    }

    function syncTitleToSelectedPeriod(items) {
      const range = getSelectedRange(items);
      const prefix = titlePrefix(state.title);
      state.title = `${prefix} ${formatRangeTitleFromDates(range.start, range.end)}`;
    }

    function titlePrefix(value) {
      const raw = String(value || "").trim();
      const withoutRange = raw.replace(/\s*\d{1,2}\s+[A-Za-z]{3}\s*-\s*\d{1,2}\s+[A-Za-z]{3}\s+\d{4}\s*$/i, "").trim();
      return withoutRange || "Roadmap ЕЛКП";
    }

    function parseDateInput(value) {
      if (!value) return null;
      const match = String(value).match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!match) return null;
      return makeDate(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
    }

    function dateToInput(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function getMonths(start, end) {
      const months = [];
      let cursor = new Date(start.getFullYear(), start.getMonth(), 1);
      while (cursor <= end) {
        months.push({
          start: new Date(cursor),
          end: new Date(cursor.getFullYear(), cursor.getMonth() + 1, 0)
        });
        cursor = new Date(cursor.getFullYear(), cursor.getMonth() + 1, 1);
      }
      return months;
    }

    function daysBetween(a, b) {
      const oneDay = 24 * 60 * 60 * 1000;
      return Math.round((stripTime(b) - stripTime(a)) / oneDay);
    }

    function addDays(date, days) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate() + days);
    }

    function formatItemDate(start, end) {
      if (!end) return formatDate(start);
      return `${formatDate(start)} - ${formatDate(end)}`;
    }

    function formatDate(date) {
      return `${String(date.getDate()).padStart(2, "0")}.${MONTHS_SHORT[date.getMonth()]}`;
    }

    function formatRangeTitle(items) {
      const min = new Date(Math.min(...items.map((item) => item.start.getTime())));
      const max = new Date(Math.max(...items.map((item) => (item.end || item.start).getTime())));
      return formatRangeTitleFromDates(min, max);
    }

    function formatRangeTitleFromDates(start, end) {
      return `${start.getDate()} ${MONTHS_SHORT[start.getMonth()]} - ${end.getDate()} ${MONTHS_SHORT[end.getMonth()]} ${end.getFullYear()}`;
    }

    function div(className) {
      const node = document.createElement("div");
      node.className = className;
      return node;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function withAlpha(color, alpha) {
      if (!color || !color.startsWith("#")) return `rgba(43, 159, 170, ${alpha})`;
      let hex = color.slice(1);
      if (hex.length === 3) hex = hex.split("").map((char) => char + char).join("");
      const r = parseInt(hex.slice(0, 2), 16);
      const g = parseInt(hex.slice(2, 4), 16);
      const b = parseInt(hex.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    loadDefaultGoogleSheet();
  </script>
</body>
</html>
